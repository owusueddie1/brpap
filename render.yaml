services:
  - type: web
    name: brpap-app
    env: python
    plan: starter
    runtime: python-3.12
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: STRIPE_SECRET_KEY
        scope: build,runtime
      - key: DOMAIN_URL
        scope: build,runtime
